name: Rename Android Package

on:
  workflow_dispatch:
    inputs:
      old_package:
        description: 'Old Package Name (e.g., com.tyron.code)'
        required: true
        default: 'com.tyron.code'
      new_package:
        description: 'New Package Name (e.g., org.codeassist.rihad)'
        required: true
        default: 'org.codeassist.rihad'

jobs:
  rename-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Replace Package String in Files
        run: |
          OLD_PKG="${{ github.event.inputs.old_package }}"
          NEW_PKG="${{ github.event.inputs.new_package }}"
          echo "Replacing $OLD_PKG with $NEW_PKG across all files..."
          
          # Find and replace in all files, ignoring .git directory
          find . -type f -not -path '*/\.git/*' -exec sed -i "s/$OLD_PKG/$NEW_PKG/g" {} +

      - name: Move Source Directories
        run: |
          OLD_PKG="${{ github.event.inputs.old_package }}"
          NEW_PKG="${{ github.event.inputs.new_package }}"
          
          OLD_DIR=$(echo $OLD_PKG | tr '.' '/')
          NEW_DIR=$(echo $NEW_PKG | tr '.' '/')
          
          echo "Moving directories from $OLD_DIR to $NEW_DIR"
          
          # Find all source directories matching the old package structure
          find . -type d | grep "/src/.*/\(java\|kotlin\)/$OLD_DIR$" | while read -r dir; do
            base_path=$(echo "$dir" | sed "s|/$OLD_DIR$||")
            new_full_path="$base_path/$NEW_DIR"
            
            echo "Creating $new_full_path"
            mkdir -p "$new_full_path"
            
            echo "Copying contents from $dir to $new_full_path"
            rsync -a "$dir/" "$new_full_path/"
            
            echo "Removing old directory $dir"
            rm -rf "$dir"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Refactor: Changed package from ${{ github.event.inputs.old_package }} to ${{ github.event.inputs.new_package }}" || echo "No changes to commit"
          git push
