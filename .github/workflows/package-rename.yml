name: Rename Android Package

on:
  workflow_dispatch:
    inputs:
      old_package:
        description: 'Purana package name'
        required: true
        default: 'org.codeassist.rihad'
      new_package:
        description: 'Naya package name'
        required: true
        default: 'dev.ankit.codeassist'

jobs:
  rename-package:
    runs-on: ubuntu-latest
    permissions:               # <-- Yeh lines 403 error ko theek karengi
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Rename Package and Update Files
        run: |
          OLD_PKG="${{ github.event.inputs.old_package }}"
          NEW_PKG="${{ github.event.inputs.new_package }}"
          
          echo "Renaming from $OLD_PKG to $NEW_PKG"
          
          # 1. Sabhi files me text replace karein
          find . -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.kts" \) -exec sed -i "s/$OLD_PKG/$NEW_PKG/g" {} +
          
          # 2. Package name ko directory path me convert karein
          OLD_PATH=$(echo "$OLD_PKG" | tr '.' '/')
          NEW_PATH=$(echo "$NEW_PKG" | tr '.' '/')
          
          # 3. Source folders ko naye structure me move karein
          SOURCESSETS=("app/src/main/java" "app/src/androidTest/java" "app/src/test/java" "app/src/main/kotlin" "app/src/androidTest/kotlin" "app/src/test/kotlin")
          
          for src in "${SOURCESSETS[@]}"; do
            if [ -d "$src/$OLD_PATH" ]; then
              echo "Moving sources in $src"
              mkdir -p "$src/$NEW_PATH"
              cp -r "$src/$OLD_PATH"/. "$src/$NEW_PATH/"
              rm -rf "$src/$OLD_PATH"
            fi
          done
          
          # 4. Khali folders clean karein
          find . -type d -empty -delete 2>/dev/null || true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Check karein ki kya sach me kuch badla hai
          if git diff --staged --quiet; then
            echo "Koi changes nahi mile. Pura package name sahi se check karein!"
          else
            git commit -m "Package name changed from ${{ github.event.inputs.old_package }} to ${{ github.event.inputs.new_package }}"
            git push origin main
          fi
          
